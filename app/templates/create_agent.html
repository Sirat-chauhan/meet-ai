{% extends "base.html" %}
{% block content %}
<section class="topbar-lite">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search" placeholder="Search">
  </div>
  <span class="shortcut-chip">⌘ K</span>
</section>
<section class="modal-wrap">
  <article class="modal-card">
    <h2>Create Agent</h2>
    <p class="muted">Create a new agent</p>
    {% if message %}
      <p class="notice">{{ message.replace('+', ' ') }}</p>
    {% endif %}
    <div class="agent-avatar">🤖</div>
    <form method="post" class="stack">
    <input name="name" placeholder="Agent Name" required>
    <textarea name="behavior_prompt" placeholder="Behavior prompt" rows="3" required></textarea>
    <textarea name="personality" placeholder="Personality" rows="3" required></textarea>
    <textarea name="interview_script" placeholder="Interview script (one question per line)" rows="5"></textarea>
    <input name="temperature" type="number" min="0" max="1.5" step="0.1" value="0.7" required>
      <div class="modal-actions">
        <a class="secondary-btn" href="/dashboard">Cancel</a>
        <button class="green-btn" type="submit">Create</button>
      </div>
    </form>
  </article>
</section>
{% endblock %}
