{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2 class="breadcrumb-title">Guest Join <span>›</span> {{ meeting.room_id }}</h2>
  <p class="muted">You joined as a guest for agent: <strong>{{ agent.name }}</strong></p>
  <div class="voice-controls" style="margin-top:8px;">
    <button id="enableDevicesBtn" type="button">Enable Camera & Mic</button>
    <button id="toggleJitsiMicBtn" type="button">Toggle Meeting Mic</button>
    <button id="toggleJitsiCamBtn" type="button">Toggle Meeting Camera</button>
    <span id="deviceStatus" class="hint">Device permission not requested yet</span>
  </div>
</section>

<section class="card">
  <div id="jitsi-container" class="guest-jitsi-frame"></div>
</section>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
  const enableDevicesBtn = document.getElementById("enableDevicesBtn");
  const toggleJitsiMicBtn = document.getElementById("toggleJitsiMicBtn");
  const toggleJitsiCamBtn = document.getElementById("toggleJitsiCamBtn");
  const deviceStatus = document.getElementById("deviceStatus");

  const api = new JitsiMeetExternalAPI("{{ jitsi_domain }}", {
    roomName: "{{ meeting.jitsi_room_name }}",
    width: "100%",
    height: 650,
    parentNode: document.querySelector("#jitsi-container"),
    configOverwrite: {
      prejoinConfig: { enabled: true },
      startWithAudioMuted: false,
      startWithVideoMuted: false
    }
  });
  api.addListener("videoConferenceJoined", () => {
    deviceStatus.textContent = "Joined meeting. Use toggles for camera/mic.";
  });

  async function enableDevices() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      deviceStatus.textContent = "Browser does not support camera/mic APIs";
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
      stream.getTracks().forEach((track) => track.stop());
      deviceStatus.textContent = "Camera/Mic permission granted";
    } catch (_) {
      deviceStatus.textContent = "Camera/Mic blocked. Allow permissions in browser settings.";
    }
  }

  enableDevicesBtn.addEventListener("click", enableDevices);
  toggleJitsiMicBtn.addEventListener("click", () => {
    try { api.executeCommand("toggleAudio"); } catch (_) {}
  });
  toggleJitsiCamBtn.addEventListener("click", () => {
    try { api.executeCommand("toggleVideo"); } catch (_) {}
  });
</script>
{% endblock %}
