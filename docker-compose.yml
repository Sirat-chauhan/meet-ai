version: "3.9"

services:
  api:
    build: .
    container_name: meet_ai_api
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    container_name: meet_ai_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - api
