version: "3.9"

services:
  api:
    build: .
    container_name: meet_ai_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: meet_ai_worker
    command: celery -A workers.celery_app.celery worker -Q summaries --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  frontend:
    image: node:20
    container_name: meet_ai_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - api

  postgres:
    image: postgres:16
    container_name: meet_ai_postgres
    environment:
      POSTGRES_USER: meetai
      POSTGRES_PASSWORD: meetai
      POSTGRES_DB: meet_ai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: meet_ai_redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
