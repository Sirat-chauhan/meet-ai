databases:
  - name: meetai-postgres
    databaseName: meetai
    user: meetai

services:
  - type: redis
    name: meetai-redis
    ipAllowList: []

  - type: web
    name: meetai-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc 'PYTHONPATH=. alembic upgrade head && gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT app.main:app'
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: JITSI_DOMAIN
        value: meet.jit.si
      - key: DATABASE_URL
        fromDatabase:
          name: meetai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: meetai-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

  - type: worker
    name: meetai-worker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workers.celery_app.celery worker -Q summaries --loglevel=info
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: meetai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: meetai-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
